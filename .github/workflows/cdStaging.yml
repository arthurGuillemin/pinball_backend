name: CD Staging

on:
  push:
    branches: [Dev]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  test:
    needs: security-scan 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test env
        run: cp .env.test .env 

      - name: Run tests
        run: npm test

  build-staging:
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: build-staging
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Staging Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            arthurguill/pinball-backend:staging-latest
            arthurguill/pinball-backend:staging-${{ github.sha }}
          cache-from: type=registry,ref=arthurguill/pinball-backend:buildcache
          cache-to: type=registry,ref=arthurguill/pinball-backend:buildcache,mode=max
